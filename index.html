<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Notes App by Lobo</title>
        <link rel="stylesheet" href="design.css?v=1.4">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body>
        <div class="top" id="top">
            <p><img id="new" class="test" src="img/newfile.png" /></p>
        </div>
        <div class="dropdown">
            <div class="dots">...</div>
            <div class="dropdown-content">
                <p></p><input type="file" id="restore" class="button"></p>
                <p></p><div id="backup" class="button">Backup</div></div></p>
            </div>
        </div>
        <div id="main" class="main"></div>
        <script src="app.js?v=1.4" type="text/javascript"></script>
    </body>
</html>
